<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cipher</title>
<style>
  :root{--bg:#080A14;--text:#EAEDF6;--dim:#8290AB;--cyan:#6FD3FF;--violet:#A98CFF;--border:rgba(120,160,220,0.14)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);display:grid;place-items:center;min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",Tahoma,Arial,sans-serif;text-align:center;padding:24px}
  .glow{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(50% 40% at 30% 10%,rgba(111,211,255,0.12),transparent 70%),radial-gradient(50% 40% at 80% 30%,rgba(169,140,255,0.12),transparent 70%)}
  .card{position:relative;z-index:1;max-width:420px}
  .logo{width:74px;height:74px;border-radius:22px;display:grid;place-items:center;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--cyan),var(--violet));color:#04202e;font-weight:900;font-size:38px;
    box-shadow:0 12px 40px rgba(111,211,255,0.28)}
  h1{font-size:32px;margin:0 0 6px;font-weight:900;letter-spacing:.5px}
  p{color:var(--dim);margin:0 0 30px;font-size:15px}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a{display:inline-block;padding:12px 22px;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px}
  .primary{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#04202e}
  .ghost{border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo">C</div>
  <h1>Cipher</h1>
  <p>تواصل صوتي ونصّي مشفّر طرف-لطرف<br/>End-to-end encrypted messaging &amp; calls</p>
  <div class="links">
    <a class="primary" href="privacy/">سياسة الخصوصية · Privacy</a>
    <a class="ghost" href="support/">الدعم · Support</a>
  </div>
</div>
</body>
</html>
